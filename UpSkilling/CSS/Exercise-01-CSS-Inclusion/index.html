<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Inclusion</title>

    <!-- Internal CSS -->
    <style>
        body {
            background-color: #f2f2f2;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:red;">Welcome to Community Event Portal</h1>

    <h2>Upcoming Events</h2>

    <p>
        This paragraph is styled using the external stylesheet.
    </p>

</body>

</html>
