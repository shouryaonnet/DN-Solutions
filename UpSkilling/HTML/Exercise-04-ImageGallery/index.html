<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        table {
            border-collapse: collapse;
            margin: auto;
        }

        td {
            padding: 15px;
            text-align: center;
        }

        .eventImage {
            width: 220px;
            border: 3px solid black;
            border-radius: 10px;
        }
    </style>

</head>

<body>

    <h1 align="center">Community Event Gallery</h1>

    <table>

        <tr>

            <td>
                <img src="images/event1.jpg"
                     alt="Music Event"
                     title="Music Event"
                     class="eventImage">

                <p>Music Festival</p>
            </td>

            <td>
                <img src="images/event2.jpg"
                     alt="Food Event"
                     title="Food Event"
                     class="eventImage">

                <p>Food Festival</p>
            </td>

            <td>
                <img src="images/event3.jpg"
                     alt="Sports Event"
                     title="Sports Event"
                     class="eventImage">

                <p>Sports Day</p>
            </td>

        </tr>

        <tr>

            <td>
                <img src="images/event4.jpg"
                     alt="Dance Event"
                     title="Dance Event"
                     class="eventImage">

                <p>Dance Competition</p>
            </td>

            <td>
                <img src="images/event5.jpg"
                     alt="Book Fair"
                     title="Book Fair"
                     class="eventImage">

                <p>Book Fair</p>
            </td>

            <td>
                <img src="images/event6.jpg"
                     alt="Tree Plantation"
                     title="Tree Plantation"
                     class="eventImage">

                <p>Tree Plantation</p>
            </td>

        </tr>

    </table>

</body>

</html>
