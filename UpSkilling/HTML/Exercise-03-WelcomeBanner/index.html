<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .highlight {
            background-color: yellow;
            padding: 4px;
        }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        <h1>Welcome Shourya!</h1>
        <p class="highlight">
            Thank you for visiting our Community Portal.
        </p>
        <p>
            <span style="color:red; font-weight:bold;">
                Special Offer: Register today and get free event goodies!
            </span>
        </p>
    </div>
</body>
</html>
