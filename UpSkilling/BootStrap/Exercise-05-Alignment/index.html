<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Alignment</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<div class="row justify-content-center align-items-center" style="height:200px;">

<div class="col-3 bg-primary text-white p-3 text-center">
Center
</div>

</div>

<hr>

<div class="row">

<div class="col-md-6 order-md-2 bg-success text-white p-3">
Second on Desktop
</div>

<div class="col-md-6 order-md-1 bg-danger text-white p-3">
First on Desktop
</div>

</div>

</div>

</body>
</html>
