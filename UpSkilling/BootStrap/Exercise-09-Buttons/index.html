<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Buttons</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<button class="btn btn-primary">Primary</button>
<button class="btn btn-secondary">Secondary</button>
<button class="btn btn-success">Success</button>
<button class="btn btn-danger">Danger</button>
<button class="btn btn-warning">Warning</button>
<button class="btn btn-info">Info</button>

<hr>

<div class="btn-group">
<button class="btn btn-outline-primary">Left</button>
<button class="btn btn-outline-primary">Middle</button>
<button class="btn btn-outline-primary">Right</button>
</div>

<hr>

<input class="btn-check" id="check1" type="checkbox">
<label class="btn btn-outline-success" for="check1">Toggle</label>

</div>

</body>
</html>
