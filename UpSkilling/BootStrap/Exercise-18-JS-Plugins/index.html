<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bootstrap Plugins</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<button class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#myModal">
Open Modal
</button>

<div class="modal fade" id="myModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Registration
</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">
Registration Successful!
</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">
Close
</button>

</div>

</div>

</div>

</div>

<div class="accordion mt-5" id="accordionExample">

<div class="accordion-item">

<h2 class="accordion-header">

<button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#one">
Question 1
</button>

</h2>

<div id="one" class="accordion-collapse collapse show">

<div class="accordion-body">
Bootstrap Accordion Example
</div>

</div>

</div>

<div class="accordion-item">

<h2 class="accordion-header">

<button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#two">
Question 2
</button>

</h2>

<div id="two" class="accordion-collapse collapse">

<div class="accordion-body">
Second Accordion Item
</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
